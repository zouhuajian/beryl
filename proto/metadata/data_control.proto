syntax = "proto3";

package metadata;

import "common/common.proto";
import "common/header.proto";

// ============================================================================
// Metadata Data Control Service (block/lease)
// ============================================================================
//
// This service handles data control plane operations:
// - Block location and placement
// - Lease management
// - Block sealing and commit
// No inode/path semantics are introduced here.

message LocateRequestProto {
  common.RequestHeaderProto header = 1;
  uint64 data_handle_id = 2;
  common.ByteRangeProto range = 3;
}

message LocateResponseProto {
  common.ResponseHeaderProto header = 1;
  repeated common.BlockMetaProto blocks = 2;
}

message AcquireLeaseRequestProto {
  common.RequestHeaderProto header = 1;
  uint64 data_handle_id = 2;
  uint32 block_index = 3;
  uint64 client_id = 4;
}

message AcquireLeaseResponseProto {
  common.ResponseHeaderProto header = 1;
  common.FencingTokenProto token = 2;
  common.BlockPlacementProto placement = 3;
}

message DataControlRenewLeaseRequestProto {
  common.RequestHeaderProto header = 1;
  uint64 data_handle_id = 2;
  uint32 block_index = 3;
  uint64 client_id = 4;
  uint64 lease_epoch = 5;
  optional uint64 call_id = 6;
}

message DataControlRenewLeaseResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 lease_deadline_ms = 2;
  uint64 renew_after_ms = 3;
  optional uint64 server_epoch = 4;
}

message SealBlockRequestProto {
  common.RequestHeaderProto header = 1;
  uint64 data_handle_id = 2;
  uint32 block_index = 3;
  common.FencingTokenProto token = 4;
}

message SealBlockResponseProto {
  common.ResponseHeaderProto header = 1;
  bool sealed = 2;
}

message CommitLengthRequestProto {
  common.RequestHeaderProto header = 1;
  uint64 data_handle_id = 2;
  uint64 committed_length = 3;
}

message CommitLengthResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 committed_length = 2;
}

service MetadataDataControlServiceProto {
  // Block location and lease management
  rpc Locate(LocateRequestProto) returns (LocateResponseProto);
  rpc AcquireLease(AcquireLeaseRequestProto) returns (AcquireLeaseResponseProto);
  rpc RenewLease(DataControlRenewLeaseRequestProto) returns (DataControlRenewLeaseResponseProto);
  rpc SealBlock(SealBlockRequestProto) returns (SealBlockResponseProto);
  rpc CommitLength(CommitLengthRequestProto) returns (CommitLengthResponseProto);
}
