syntax = "proto3";

package metadata;

import "common/common.proto";
import "common/header.proto";
import "fs/types.proto";
import "metadata/fs.proto";

// ============================================================================
// Metadata Path Service (Thin Adapter Layer)
// ============================================================================
//
// IMPORTANT: This service is a PATH-BASED ADAPTER layer only.
// - Implementation: path -> walk(dentry) -> call MetadataFsServiceProto (inode-centric).
// - Path is NOT authoritative storage; it's only used as input or optional cache index.
// - All FS semantics (inode/dentry/attrs/Open/Release/Fsync/Rename/ReadDir) are
//   defined in MetadataFsServiceProto (fs.proto). This service does NOT define
//   a second authoritative identity/handle/status model.
//
// Naming Convention:
// - All message/enum/service names end with *Proto suffix.
// - RPC method names include "Path" semantic to avoid confusion with fs.proto methods.
//
// Error Model:
// - All RPCs return gRPC OK status.
// - Failures are carried via ResponseHeaderProto.error (unified error model).
//
// Cookie/Cursor Semantics:
// - ListStatusPathProto cursor is a PATH-LAYER pagination cursor (for recursive listing).
// - It does NOT promise consistency with fs.ReadDir's cookie semantics.
// - Implementation may map to fs.ReadDir internally, but cursor format is opaque to clients.

// ============================================================================
// Lookup Path (resolve path to inode + attrs)
// ============================================================================

message LookupPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
}

message LookupPathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Found inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

// ============================================================================
// Get Attributes by Path
// ============================================================================

message GetAttrPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
}

message GetAttrPathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File attributes.
  fs.FileAttrsProto attrs = 2;
  /// Optional: inode for convenience (if available).
  optional fs.InodeProto inode = 3;
}

// ============================================================================
// Create Directory by Path
// ============================================================================

message MkdirPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
  /// Initial attributes.
  fs.FileAttrsProto attrs = 3;
  /// Create parent directories if missing (mkdir -p).
  bool create_parents = 4;
}

message MkdirPathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

// ============================================================================
// Create File by Path
// ============================================================================

message CreatePathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
  /// Initial attributes.
  fs.FileAttrsProto attrs = 3;
  /// File layout (for data plane).
  common.FileLayoutProto layout = 4;
}

message CreatePathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Created inode (optional, for convenience).
  optional fs.InodeProto inode = 3;
  /// File attributes.
  fs.FileAttrsProto attrs = 4;
}

// ============================================================================
// Unlink (Delete File) by Path
// ============================================================================

message UnlinkPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
}

message UnlinkPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Remove Directory by Path
// ============================================================================

message RmdirPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
}

message RmdirPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Rename by Path
// ============================================================================

message RenamePathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Source path (UTF-8).
  string src_path = 2;
  /// Destination path (UTF-8).
  string dst_path = 3;
  /// Rename flags (e.g., RENAME_NOREPLACE, RENAME_EXCHANGE).
  /// Must align with fs.proto FsRenameRequestProto.flags semantics.
  /// Use 0 for standard rename.
  uint32 flags = 4;
}

message RenamePathResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// List Status by Path (recursive directory listing)
// ============================================================================

message ListStatusPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
  /// Recursive listing (list subdirectories).
  bool recursive = 3;
  /// Pagination cursor (opaque bytes from previous ListStatusPathResponseProto.next_cursor).
  /// Empty for first request.
  bytes cursor = 4;
  /// Maximum number of entries to return.
  uint32 limit = 5;
}

message ListStatusPathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Directory entries (reuses fs.DirEntryProto from fs.proto).
  repeated fs.DirEntryProto entries = 2;
  /// Next pagination cursor (opaque bytes, use as cursor in next request).
  /// Empty if eof=true.
  bytes next_cursor = 3;
  /// End of listing (no more entries).
  bool eof = 4;
}

// ============================================================================
// Open File by Path (optional convenience API)
// ============================================================================

message OpenPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
  /// Open flags (O_RDONLY, O_WRONLY, O_RDWR, etc.).
  /// Must align with fs.proto OpenRequestProto.flags semantics.
  uint32 flags = 3;
}

message OpenPathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File handle (reuses fs.proto semantics: uint64 file_handle).
  /// This is the same handle type used by MetadataFsServiceProto.Open/Release.
  uint64 file_handle = 2;
}

// ============================================================================
// Release File Handle (optional convenience API)
// ============================================================================

message ReleasePathRequestProto {
  common.RequestHeaderProto header = 1;
  /// File handle (from OpenPathResponseProto or MetadataFsServiceProto.Open).
  uint64 file_handle = 2;
}

message ReleasePathResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Fsync by Path or Handle (optional convenience API)
// ============================================================================

message FsyncPathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Either path or file_handle must be provided.
  oneof target {
    /// Path-based fsync.
    string path = 2;
    /// Handle-based fsync (from OpenPathResponseProto or MetadataFsServiceProto.Open).
    uint64 file_handle = 3;
  }
  /// Fsync flags.
  /// Must align with fs.proto FsyncRequestProto.flags semantics.
  uint32 flags = 4;
}

message FsyncPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Hsync by Path or Handle (alias to Fsync).
message HsyncPathRequestProto {
  FsyncPathRequestProto fsync = 1;
}

message HsyncPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Hflush by Path or Handle (alias to Fsync).
message HflushPathRequestProto {
  FsyncPathRequestProto fsync = 1;
}

message HflushPathResponseProto {
  common.ResponseHeaderProto header = 1;
}
// ============================================================================
// Truncate by Path
// ============================================================================

message TruncatePathRequestProto {
  common.RequestHeaderProto header = 1;
  /// Absolute or relative path (UTF-8).
  string path = 2;
  /// New file size.
  uint64 new_size = 3;
  /// Lease ID (required for truncate).
  common.LeaseIdProto lease_id = 4;
  /// Lease epoch (must match active lease).
  uint64 lease_epoch = 5;
}

message TruncatePathResponseProto {
  common.ResponseHeaderProto header = 1;
  /// New file size after truncate.
  uint64 new_size = 2;
}

// ============================================================================
// Extended attributes
// ============================================================================

message SetXattrPathRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  string name = 3;
  bytes value = 4;
  bool create = 5;
  bool replace = 6;
}

message SetXattrPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

message GetXattrPathRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  string name = 3;
}

message GetXattrPathResponseProto {
  common.ResponseHeaderProto header = 1;
  bytes value = 2;
}

message ListXattrPathRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
}

message ListXattrPathResponseProto {
  common.ResponseHeaderProto header = 1;
  repeated string names = 2;
}

message RemoveXattrPathRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  string name = 3;
}

message RemoveXattrPathResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Block locations helper
// ============================================================================

message GetFileBlockLocationsPathRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  optional common.ByteRangeProto range = 3;
}

message GetFileBlockLocationsPathResponseProto {
  common.ResponseHeaderProto header = 1;
  repeated fs.ExtentProto extents = 2;
  uint64 file_size = 3;
  repeated metadata.FileBlockLocationProto locations = 4;
}

// ===== Events/Records =====
// (No events; this adapter only exposes request/response.)

// ============================================================================
// Metadata Path Service  
// ============================================================================

service MetadataPathServiceProto {
  // Core path-based operations (adapter layer)
  rpc LookupPath(LookupPathRequestProto) returns (LookupPathResponseProto);
  rpc GetAttrPath(GetAttrPathRequestProto) returns (GetAttrPathResponseProto);
  rpc MkdirPath(MkdirPathRequestProto) returns (MkdirPathResponseProto);
  rpc CreatePath(CreatePathRequestProto) returns (CreatePathResponseProto);
  rpc UnlinkPath(UnlinkPathRequestProto) returns (UnlinkPathResponseProto);
  rpc RmdirPath(RmdirPathRequestProto) returns (RmdirPathResponseProto);
  rpc RenamePath(RenamePathRequestProto) returns (RenamePathResponseProto);
  rpc ListStatusPath(ListStatusPathRequestProto) returns (ListStatusPathResponseProto);

  // Optional convenience APIs (reuse fs.proto handle semantics)
  rpc OpenPath(OpenPathRequestProto) returns (OpenPathResponseProto);
  rpc ReleasePath(ReleasePathRequestProto) returns (ReleasePathResponseProto);
  rpc FsyncPath(FsyncPathRequestProto) returns (FsyncPathResponseProto);
  rpc HsyncPath(HsyncPathRequestProto) returns (HsyncPathResponseProto);
  rpc HflushPath(HflushPathRequestProto) returns (HflushPathResponseProto);

  // Truncate by path
  rpc TruncatePath(TruncatePathRequestProto) returns (TruncatePathResponseProto);

  // Xattr
  rpc SetXattrPath(SetXattrPathRequestProto) returns (SetXattrPathResponseProto);
  rpc GetXattrPath(GetXattrPathRequestProto) returns (GetXattrPathResponseProto);
  rpc ListXattrPath(ListXattrPathRequestProto) returns (ListXattrPathResponseProto);
  rpc RemoveXattrPath(RemoveXattrPathRequestProto) returns (RemoveXattrPathResponseProto);

  // Block locations
  rpc GetFileBlockLocationsPath(GetFileBlockLocationsPathRequestProto)
      returns (GetFileBlockLocationsPathResponseProto);
}
