syntax = "proto3";

package metadata;

import "common/common.proto";
import "common/header.proto";

// ============================================================================
// Metadata Route Service (routing/consistency/cache refresh)
// ============================================================================
//
// This service handles routing, consistency, and cache refresh operations.
// No inode/path semantics are introduced here.
// State freshness uses RequestHeader.state / ResponseHeader.state with
// GroupStateWatermark entries. route_epoch and mount_epoch remain separate
// config freshness domains.

message GetFileMetaRequestProto {
  common.RequestHeaderProto header = 1;
  // header.group_id is required
  // header.state carries client-required GroupStateWatermark entries for
  // follower read-gating when the route service implements this operation.

  oneof target {
    uint64 inode_id = 2;
    string path = 3;
  }
  common.ConsistencyLevelProto consistency = 4;
}

message GetFileMetaResponseProto {
  common.ResponseHeaderProto header = 1;
  common.FileMetaProto meta = 2;
  uint64 leader_id = 3;
  repeated uint64 follower_ids = 4;
  uint64 route_epoch = 5;
  map<uint64, common.WorkerEndpointInfoProto> worker_info = 6;
}

message RefreshRouteRequestProto {
  common.RequestHeaderProto header = 1;
  optional uint64 inode_id = 2;
}

message RefreshRouteResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 route_epoch = 2;
  map<uint64, uint64> shard_to_group = 3;
}

message MsyncRequestProto {
  common.RequestHeaderProto header = 1;
  // Current production Msync is single-group. The target group must be
  // expressed by header.group_id, or by exactly one GroupStateWatermark in
  // MsyncRequest.header.state.
  // MsyncRequest.header.state carries the client-known / required group state
  // watermark; if present, the leader waits until last_applied has reached it.
  // header.deadline_ms + gRPC deadline controls timeout

  optional bool include_readable_followers = 6;
}

message MsyncResponseProto {
  common.ResponseHeaderProto header = 1;
  // header.group_id identifies the group that was synchronized.
  // ResponseHeader.state carries one GroupStateWatermark only when the service
  // can prove authoritative leader state for the requested group. Multi-group
  // Msync remains future work.

  repeated uint64 readable_follower_ids = 2;
}

message GetRouteTableRequestProto {
  common.RequestHeaderProto header = 1;
}

message GetRouteTableResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 route_epoch = 2;
  map<uint64, uint64> shard_to_group = 3;
  map<uint64, uint64> group_to_leader = 4;
  map<uint64, NodeListProto> group_to_followers = 5;
}

message NodeListProto {
  repeated uint64 node_ids = 1;
}

service MetadataRouteServiceProto {
  // File metadata and routing
  rpc GetFileMeta(GetFileMetaRequestProto) returns (GetFileMetaResponseProto);
  rpc RefreshRoute(RefreshRouteRequestProto) returns (RefreshRouteResponseProto);
  rpc Msync(MsyncRequestProto) returns (MsyncResponseProto);
  rpc GetRouteTable(GetRouteTableRequestProto) returns (GetRouteTableResponseProto);
}
