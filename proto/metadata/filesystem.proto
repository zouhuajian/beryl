syntax = "proto3";

package metadata;

import "common/common.proto";
import "common/header.proto";
import "fs/types.proto";

// ============================================================================
// FileSystemServiceProto
// ============================================================================
//
// FileSystemServiceProto is the external metadata/control-plane API.
//
// Error contract:
// - Recoverable business, protocol, and consistency failures return gRPC OK.
// - ResponseHeaderProto.error carries the canonical error envelope.
// - Non-OK gRPC status is reserved for transport, auth, and framework failures.
//
// Authority contract:
// - Path is an adapter entrypoint.
// - inode, data_handle, block, lease, fencing, and epoch identities carry the
//   consistency contract.
// - WriteSession is an internal implementation concept and is not a public RPC
//   name or message name.

// ============================================================================
// Shared external payloads
// ============================================================================

message WriteHandleProto {
  uint64 handle_id = 1;
  common.LeaseIdProto lease_id = 2;
  uint64 lease_epoch = 3;
  uint64 open_epoch = 4;
  common.FencingTokenProto fencing_token = 5;
}

enum CreateDispositionProto {
  CREATE_DISPOSITION_UNSPECIFIED = 0;
  CREATE_NEW = 1;
  OVERWRITE = 2;
}

message WriteTargetProto {
  common.BlockIdProto block_id = 1;
  uint64 file_offset = 2;
  // Metadata-selected Vecton block data/meta interpretation format for this target.
  // Worker-local execution backend selection is not encoded here.
  uint32 block_format_id = 3;
  // Full logical block size from the persisted FileLayout. Workers persist this
  // value in BlockMeta.format.block_size.
  uint64 block_size = 4;
  // Metadata-selected chunk size for the worker-local block format.
  uint32 chunk_size = 5;
  // Metadata-assigned stamp that the worker must persist when publishing this
  // block and future direct readers must present back to the worker.
  uint64 block_stamp = 6;
  // Valid length for this block target. It is normally equal to block_size for
  // full blocks and may be smaller for tail or bounded blocks. Workers publish
  // this as BlockMeta.source.effective_len.
  uint64 effective_len = 7;
  repeated common.WorkerEndpointInfoProto worker_endpoints = 8;
  common.FencingTokenProto fencing_token = 9;
  // Worker-local storage tier requested for this block replica.
  common.TierProto tier = 10;
}

message CommittedBlockProto {
  common.BlockIdProto block_id = 1;
  uint64 file_offset = 2;
  uint64 len = 3;
  optional bytes checksum = 4;
}

message FileBlockLocationProto {
  common.BlockIdProto block_id = 1;
  uint64 file_offset = 2;
  uint64 len = 3;
  // Metadata-issued read candidates. Empty means FileLayout has this block
  // range but no live reported replica is currently eligible.
  repeated common.WorkerEndpointInfoProto workers = 4;
  // Metadata-authoritative logical stamp for this block generation.
  // Normal readable locations must carry a non-zero value.
  optional uint64 block_stamp = 5;
  // FileLayout-derived block format facts that workers validate before reads.
  uint32 block_format_id = 6;
  uint64 block_size = 7;
  uint32 chunk_size = 8;
  // Block-local readable prefix expected by metadata for this block.
  uint64 effective_len = 9;
}

// ============================================================================
// Namespace
// ============================================================================

message GetStatusRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
}

message GetStatusResponseProto {
  common.ResponseHeaderProto header = 1;
  fs.InodeIdProto inode_id = 2;
  fs.FileAttrsProto attrs = 3;
}

message ListStatusRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  bool recursive = 3;
  bytes cursor = 4;
  uint32 limit = 5;
}

message ListStatusResponseProto {
  common.ResponseHeaderProto header = 1;
  repeated fs.DirEntryProto entries = 2;
  bytes next_cursor = 3;
  bool eof = 4;
}

message CreateDirectoryRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  fs.FileAttrsProto attrs = 3;
  bool create_parents = 4;
}

message CreateDirectoryResponseProto {
  common.ResponseHeaderProto header = 1;
  fs.InodeIdProto inode_id = 2;
  fs.FileAttrsProto attrs = 3;
}

message DeleteRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  bool recursive = 3;
}

message DeleteResponseProto {
  common.ResponseHeaderProto header = 1;
}

message RenameRequestProto {
  common.RequestHeaderProto header = 1;
  string src_path = 2;
  string dst_path = 3;
  uint32 flags = 4;
}

message RenameResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Read
// ============================================================================

message OpenFileRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  optional common.ByteRangeProto range = 3;
  bool include_locations = 4;
}

message OpenFileResponseProto {
  common.ResponseHeaderProto header = 1;
  fs.InodeIdProto inode_id = 2;
  common.DataHandleIdProto data_handle_id = 3;
  uint64 file_size = 4;
  // Durable visible file state version for the current committed read plan.
  // It advances when cached OpenFile/GetBlockLocations data may be invalid.
  optional uint64 file_version = 5;
  repeated FileBlockLocationProto locations = 6;
}

message GetBlockLocationsRequestProto {
  common.RequestHeaderProto header = 1;
  oneof target {
    string path = 2;
    fs.InodeIdProto inode_id = 3;
    common.DataHandleIdProto data_handle_id = 4;
  }
  optional common.ByteRangeProto range = 5;
}

message GetBlockLocationsResponseProto {
  common.ResponseHeaderProto header = 1;
  fs.InodeIdProto inode_id = 2;
  common.DataHandleIdProto data_handle_id = 3;
  uint64 file_size = 4;
  repeated FileBlockLocationProto locations = 5;
  // Same version contract as OpenFileResponseProto.file_version.
  optional uint64 file_version = 6;
}

// ============================================================================
// Write
// ============================================================================

message CreateFileRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  fs.FileAttrsProto attrs = 3;
  common.FileLayoutProto layout = 4;
  CreateDispositionProto disposition = 5;
  optional uint64 desired_len = 6;
}

message CreateFileResponseProto {
  common.ResponseHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
  fs.InodeIdProto inode_id = 3;
  common.DataHandleIdProto data_handle_id = 4;
  uint64 base_size = 5;
  // CreateFile does not issue write targets; callers must use AddBlock.
  repeated WriteTargetProto initial_targets = 6;
  uint64 expires_at_ms = 7;
  // Metadata-stored FileLayout accepted for this write session.
  common.FileLayoutProto layout = 8;
}

message AppendFileRequestProto {
  common.RequestHeaderProto header = 1;
  string path = 2;
  optional uint64 desired_len = 3;
}

message AppendFileResponseProto {
  common.ResponseHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
  fs.InodeIdProto inode_id = 3;
  common.DataHandleIdProto data_handle_id = 4;
  uint64 base_size = 5;
  // AppendFile does not issue write targets; callers must use AddBlock.
  repeated WriteTargetProto initial_targets = 6;
  uint64 expires_at_ms = 7;
  // Metadata-stored FileLayout for the existing file.
  common.FileLayoutProto layout = 8;
}

message AddBlockRequestProto {
  common.RequestHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
  optional uint64 desired_len = 3;
}

message AddBlockResponseProto {
  common.ResponseHeaderProto header = 1;
  WriteTargetProto target = 2;
}

message CommitFileRequestProto {
  common.RequestHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
  common.DataHandleIdProto data_handle_id = 3;
  repeated CommittedBlockProto committed_blocks = 4;
  uint64 final_size = 5;
}

message CommitFileResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 committed_size = 2;
  // Durable visible file state version published by the successful commit.
  optional uint64 file_version = 3;
}

message AbortFileWriteRequestProto {
  common.RequestHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
}

message AbortFileWriteResponseProto {
  common.ResponseHeaderProto header = 1;
}

message RenewLeaseRequestProto {
  common.RequestHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
}

message RenewLeaseResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 expires_at_ms = 2;
}

// SyncWrite is a write-session barrier that keeps the write handle open.
enum WriteSyncModeProto {
  WRITE_SYNC_MODE_UNSPECIFIED = 0;
  // VISIBILITY publishes committed data up to target_size to new readers.
  WRITE_SYNC_MODE_VISIBILITY = 1;
  // DURABILITY means VISIBILITY after the client has requested worker durable
  // sync for the published prefix.
  WRITE_SYNC_MODE_DURABILITY = 2;
}

message SyncWriteRequestProto {
  common.RequestHeaderProto header = 1;
  WriteHandleProto write_handle = 2;
  common.DataHandleIdProto data_handle_id = 3;
  repeated CommittedBlockProto committed_blocks = 4;
  uint64 target_size = 5;
  WriteSyncModeProto mode = 6;
  uint32 flags = 7;
}

message SyncWriteResponseProto {
  common.ResponseHeaderProto header = 1;
  uint64 synced_size = 2;
  optional uint64 file_version = 3;
}

// ============================================================================
// Metadata state freshness
// ============================================================================

message MsyncRequestProto {
  common.RequestHeaderProto header = 1;
}

message MsyncResponseProto {
  common.ResponseHeaderProto header = 1;
  common.GroupStateWatermarkProto state = 2;
}

service FileSystemServiceProto {
  // namespace
  rpc GetStatus(GetStatusRequestProto) returns (GetStatusResponseProto);
  rpc ListStatus(ListStatusRequestProto) returns (ListStatusResponseProto);
  rpc CreateDirectory(CreateDirectoryRequestProto) returns (CreateDirectoryResponseProto);
  rpc Delete(DeleteRequestProto) returns (DeleteResponseProto);
  rpc Rename(RenameRequestProto) returns (RenameResponseProto);

  // read
  rpc OpenFile(OpenFileRequestProto) returns (OpenFileResponseProto);
  rpc GetBlockLocations(GetBlockLocationsRequestProto) returns (GetBlockLocationsResponseProto);

  // write
  rpc CreateFile(CreateFileRequestProto) returns (CreateFileResponseProto);
  rpc AppendFile(AppendFileRequestProto) returns (AppendFileResponseProto);
  rpc AddBlock(AddBlockRequestProto) returns (AddBlockResponseProto);
  rpc CommitFile(CommitFileRequestProto) returns (CommitFileResponseProto);
  rpc AbortFileWrite(AbortFileWriteRequestProto) returns (AbortFileWriteResponseProto);
  rpc RenewLease(RenewLeaseRequestProto) returns (RenewLeaseResponseProto);

  // SyncWrite keeps the write handle/session open.
  // CommitFile remains the final close operation.
  rpc SyncWrite(SyncWriteRequestProto) returns (SyncWriteResponseProto);

  // freshness
  rpc Msync(MsyncRequestProto) returns (MsyncResponseProto);
}
