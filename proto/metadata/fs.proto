syntax = "proto3";

package metadata;

import "common/common.proto";
import "common/header.proto";
import "fs/types.proto";

/// Write target metadata for OpenWrite (block + endpoints + fencing token).
message WriteTargetProto {
  /// Target block for the write.
  common.BlockIdProto block_id = 1;
  /// Worker endpoints authorized to accept the write.
  repeated common.WorkerEndpointInfoProto worker_endpoints = 2;
  /// Fencing token associated with the block.
  common.FencingTokenProto fencing_token = 3;
}

// ===== Request/Response =====

// ============================================================================
// Metadata FS Service (Inode-centric privileged entrypoint)
// ============================================================================
//
// PRIVILEGED ENTRYPOINT:
// - This service is inode/handle-centric and reserved for FUSE/trusted clients.
// - External/general clients should use metadata.FileSystemServiceProto (filesystem.proto).
// - Do not add new external/public path APIs here.

/// Lookup request: resolve name to inode.
message LookupRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// Entry name (UTF-8).
  string name = 3;
}

/// Lookup response: inode + attributes.
message LookupResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Found inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

/// Get attributes request.
message GetAttrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
}

/// Get attributes response.
message GetAttrResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File attributes.
  fs.FileAttrsProto attrs = 2;
}

/// Set attributes request.
message SetAttrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Attribute mask (which fields to update).
  /// Bit flags: 1=size, 2=mode, 4=uid, 8=gid, 16=atime, 32=mtime.
  uint32 mask = 3;
  /// New attributes (only fields specified by mask are applied).
  fs.FileAttrsProto attrs = 4;
}

/// Set attributes response.
message SetAttrResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Updated attributes.
  fs.FileAttrsProto attrs = 2;
}

/// Create directory request.
message MkdirRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// Directory name (UTF-8).
  string name = 3;
  /// Initial attributes.
  fs.FileAttrsProto attrs = 4;
}

/// Create directory response.
message MkdirResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

/// Create file request.
message CreateRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// File name (UTF-8).
  string name = 3;
  /// Initial attributes.
  fs.FileAttrsProto attrs = 4;
  /// File layout (for data plane).
  common.FileLayoutProto layout = 5;
}

/// Create file response.
message CreateResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
  /// Data handle for the created file instance (data-plane identity).
  uint64 data_handle_id = 4;
}

/// Read directory request.
message ReadDirRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID (directory).
  fs.InodeIdProto parent_inode_id = 2;
  /// Cursor key (opaque bytes from previous ReadDir response's next_cursor_key).
  /// Empty for first read.
  bytes cursor_key = 3;
  /// Maximum number of entries to return.
  uint32 max_entries = 4;
}

/// Read directory response.
message ReadDirResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Directory entries.
  repeated fs.DirEntryProto entries = 2;
  /// Next cursor key (opaque bytes, use as cursor_key in next request).
  /// Empty if eof=true.
  bytes next_cursor_key = 3;
  /// End of directory (no more entries).
  bool eof = 4;
}

/// Unlink (delete file) request.
message UnlinkRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// Entry name (UTF-8).
  string name = 3;
}

/// Unlink response.
message UnlinkResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Remove directory request.
message RmdirRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// Directory name (UTF-8).
  string name = 3;
}

/// Remove directory response.
message RmdirResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Rename request (inode-centric, different from path-based RenameRequestProto).
message FsRenameRequestProto {
  common.RequestHeaderProto header = 1;
  /// Source parent inode ID.
  fs.InodeIdProto src_parent_inode_id = 2;
  /// Source entry name (UTF-8).
  string src_name = 3;
  /// Destination parent inode ID.
  fs.InodeIdProto dst_parent_inode_id = 4;
  /// Destination entry name (UTF-8).
  string dst_name = 5;
  /// Rename flags (e.g., RENAME_NOREPLACE, RENAME_EXCHANGE).
  /// Use 0 for standard rename.
  uint32 flags = 6;
}

/// Rename response (inode-centric).
message FsRenameResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Open file request (placeholder, may return file_handle for future use).
message OpenRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Open flags (O_RDONLY, O_WRONLY, O_RDWR, etc.).
  uint32 flags = 3;
}

/// Open file response.
message OpenResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File handle (for future use, may return 0).
  uint64 file_handle = 2;
}

/// Release file request (placeholder).
message ReleaseRequestProto {
  common.RequestHeaderProto header = 1;
  /// File handle.
  uint64 file_handle = 2;
}

/// Release file response.
message ReleaseResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Fsync request (placeholder).
message FsyncRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Fsync flags (kept for compatibility).
  uint32 flags = 3;
  /// Optional write session handle (preferred for active writers).
  optional uint64 file_handle = 4;
  /// Lease ID for fencing validation (required when file_handle is absent).
  optional common.LeaseIdProto lease_id = 5;
  /// Lease epoch for fencing validation.
  optional uint64 lease_epoch = 6;
  /// Fencing token for worker validation.
  optional common.FencingTokenProto fencing_token = 7;
  /// Route epoch observed by client (for refresh).
  optional uint64 route_epoch = 8;
  /// Worker epoch observed by client (for refresh).
  optional uint64 worker_epoch = 9;
  /// Optional committed size hint (used for hsync/hflush).
  optional uint64 target_size = 10;
}

/// Fsync response.
message FsyncResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Hsync request (alias to Fsync with same semantics).
message HsyncRequestProto {
  FsyncRequestProto fsync = 1;
}

/// Hsync response.
message HsyncResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Hflush request (alias to Fsync with same semantics).
message HflushRequestProto {
  FsyncRequestProto fsync = 1;
}

/// Hflush response.
message HflushResponseProto {
  common.ResponseHeaderProto header = 1;
}

// ============================================================================
// Write Path
// ============================================================================

/// Write mode (for OpenWrite).
enum WriteModeProto {
  WRITE_MODE_UNSPECIFIED = 0;
  /// Write mode: can write at any offset (future support).
  WRITE_MODE_WRITE = 1;
  /// Append mode: writes must start from file_size.
  WRITE_MODE_APPEND = 2;
}

/// Open for write request.
message OpenWriteRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID of the file to open for writing.
  fs.InodeIdProto inode_id = 2;
  /// Desired write length (hint for block allocation, optional).
  optional uint64 desired_len = 3;
  /// Write mode (WRITE or APPEND).
  /// Added for append support.
  WriteModeProto mode = 4;
}

/// Open for write response.
message OpenWriteResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File handle for this write session.
  uint64 file_handle = 2;
  /// Lease ID / fencing token for this write session.
  common.LeaseIdProto lease_id = 3;
  /// Fencing token (for worker validation).
  common.FencingTokenProto fencing_token = 4;
  /// Write targets (blocks + worker endpoints).
  repeated WriteTargetProto write_targets = 5;
  /// Base file size at open time (for append-only validation).
  uint64 base_size = 6;
  /// Open epoch (for idempotency and replay protection).
  uint64 open_epoch = 7;
  /// Lease epoch (for fencing validation).
  /// Added for lease management.
  uint64 lease_epoch = 8;
  /// Lease expiration time (milliseconds since epoch).
  /// Added for lease management.
  uint64 expires_at_ms = 9;
}

/// Close write request (commit extents).
message CloseWriteRequestProto {
  common.RequestHeaderProto header = 1;
  /// File handle from OpenWrite.
  uint64 file_handle = 2;
  /// Lease ID / fencing token (must match OpenWrite response).
  common.LeaseIdProto lease_id = 3;
  /// Fencing token (must match OpenWrite response).
  common.FencingTokenProto fencing_token = 4;
  /// Extents written (must be append-only: file_offset starts from base_size).
  repeated fs.ExtentProto extents = 5;
  /// Final file size after this write.
  uint64 final_size = 6;
  /// Open epoch (must match OpenWrite response).
  uint64 open_epoch = 7;
  /// Lease epoch (must match OpenWrite response, for fencing).
  /// Added for lease management.
  uint64 lease_epoch = 8;
}

/// Close write response.
message CloseWriteResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Committed file size.
  uint64 committed_size = 2;
  /// File version (if implemented).
  optional uint64 file_version = 3;
}

/// Get file layout request (for read path).
message GetFileLayoutRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Byte range (optional, if not provided returns all extents).
  optional common.ByteRangeProto range = 3;
}

/// Get file layout response.
message GetFileLayoutResponseProto {
  common.ResponseHeaderProto header = 1;
  /// File extents (filtered by range if provided).
  repeated fs.ExtentProto extents = 2;
  /// File size.
  uint64 file_size = 3;
  /// Optional block locations (presence hints).
  repeated FileBlockLocationProto locations = 4;
}

/// File block location with presence hints.
// ============================================================================
// Lease Management
// ============================================================================

/// Renew inode lease request (for inode-level write lease).
/// Note: This is different from data_control.RenewLease (which is for block-level).
message RenewInodeLeaseRequestProto {
  common.RequestHeaderProto header = 1;
  /// File handle from OpenWrite.
  uint64 file_handle = 2;
  /// Lease ID (must match OpenWrite response).
  common.LeaseIdProto lease_id = 3;
  /// Lease epoch (must match OpenWrite response).
  uint64 lease_epoch = 4;
}

/// Renew inode lease response.
message RenewInodeLeaseResponseProto {
  common.ResponseHeaderProto header = 1;
  /// New expiration time (milliseconds since epoch).
  uint64 expires_at_ms = 2;
}

// ============================================================================
// Truncate
// ============================================================================

/// Truncate file request.
message TruncateRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// New file size.
  uint64 new_size = 3;
  /// Lease ID (required for truncate, to avoid conflicts with concurrent writes).
  common.LeaseIdProto lease_id = 4;
  /// Lease epoch (must match active lease).
  uint64 lease_epoch = 5;
}

/// Truncate file response.
message TruncateResponseProto {
  common.ResponseHeaderProto header = 1;
  /// New file size after truncate.
  uint64 new_size = 2;
}

// ============================================================================
// Extended attributes (xattr)
// ============================================================================

/// Set xattr request.
message SetXattrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Attribute name.
  string name = 3;
  /// Attribute value.
  bytes value = 4;
  /// Create only (fail if exists).
  bool create = 5;
  /// Replace only (fail if missing).
  bool replace = 6;
}

/// Set xattr response.
message SetXattrResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Get xattr request.
message GetXattrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Attribute name.
  string name = 3;
}

/// Get xattr response.
message GetXattrResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Attribute value.
  bytes value = 2;
}

/// List xattr request.
message ListXattrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
}

/// List xattr response.
message ListXattrResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Attribute names.
  repeated string names = 2;
}

/// Remove xattr request.
message RemoveXattrRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Attribute name.
  string name = 3;
}

/// Remove xattr response.
message RemoveXattrResponseProto {
  common.ResponseHeaderProto header = 1;
}

/// Stat filesystem request (placeholder).
message StatFsRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID (for mount point identification).
  fs.InodeIdProto inode_id = 2;
}

/// Stat filesystem response.
message StatFsResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Total blocks.
  uint64 total_blocks = 2;
  /// Free blocks.
  uint64 free_blocks = 3;
  /// Available blocks.
  uint64 available_blocks = 4;
  /// Block size.
  uint64 block_size = 5;
}

/// Access check request (placeholder).
message AccessRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
  /// Access mode (R_OK, W_OK, X_OK).
  uint32 mode = 3;
}

/// Access check response.
message AccessResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Access granted.
  bool granted = 2;
}

/// Create symlink request (placeholder).
message SymlinkRequestProto {
  common.RequestHeaderProto header = 1;
  /// Parent inode ID.
  fs.InodeIdProto parent_inode_id = 2;
  /// Link name (UTF-8).
  string name = 3;
  /// Target path (UTF-8).
  string target = 4;
  /// Initial attributes.
  fs.FileAttrsProto attrs = 5;
}

/// Create symlink response.
message SymlinkResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode.
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

/// Read symlink request (placeholder).
message ReadlinkRequestProto {
  common.RequestHeaderProto header = 1;
  /// Inode ID.
  fs.InodeIdProto inode_id = 2;
}

/// Read symlink response.
message ReadlinkResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Target path (UTF-8).
  string target = 2;
}

/// Create hardlink request (not implemented).
message LinkRequestProto {
  common.RequestHeaderProto header = 1;
  /// Source inode ID.
  fs.InodeIdProto src_inode_id = 2;
  /// Destination parent inode ID.
  fs.InodeIdProto dst_parent_inode_id = 3;
  /// Destination entry name (UTF-8).
  string dst_name = 4;
}

/// Create hardlink response.
message LinkResponseProto {
  common.ResponseHeaderProto header = 1;
  /// Created inode (same as src_inode_id).
  fs.InodeProto inode = 2;
  /// File attributes.
  fs.FileAttrsProto attrs = 3;
}

// ===== Events/Records =====
/// File block location with presence hints.
message FileBlockLocationProto {
  /// Block slice this location covers.
  common.BlockIdProto block_id = 1;
  /// File offset that this block maps to.
  uint64 file_offset = 2;
  /// Length (bytes) covered by this block.
  uint64 len = 3;
  /// Worker endpoints that currently host the block (presence hint).
  repeated common.WorkerEndpointInfoProto workers = 4;
  /// Optional presence epoch (worker epoch).
  optional uint64 worker_epoch = 5;
}
