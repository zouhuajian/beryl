syntax = "proto3";

package worker;

import "common/common.proto";
import "common/header.proto";
import "common/errors.proto";

// ============================================================================
// Data-Plane Request/Response Headers
// ============================================================================

/// Request header for data-plane operations (OpenReadStream/OpenWriteStream).
message DataRequestHeaderProto {
  /// Client information (call_id, client_id, client_name).
  common.ClientInfoProto client = 1;

  /// W3C Trace Context: traceparent header value.
  string traceparent = 2;
}

/// Response header for data-plane operations (OpenReadStream/OpenWriteStream).
/// Uses the same canonical error model as control-plane ResponseHeaderProto.
message DataResponseHeaderProto {
  /// Client information (call_id, client_id, client_name).
  common.ClientInfoProto client = 1;

  /// Canonical error detail (single source of truth for all error semantics).
  /// If error_class = ERROR_CLASS_OK, this field should be unset or have error_class = OK.
  /// For errors, this field contains all error information (class, code, reason, retry_after_ms).
  optional common.ErrorDetailProto error = 2;

  /// Current worker_epoch as observed by the worker.
  /// Filled when returning NEED_REFRESH for WorkerEpochMismatch/Fencing to let clients refresh cache.
  optional uint64 worker_epoch = 3;

  /// Optional endpoint hint for redirect/refresh (single endpoint for now).
  /// This provides enough data for the client to refresh connection without a separate metadata round trip.
  optional common.WorkerEndpointInfoProto endpoint_hint = 4;
}
