syntax = "proto3";

package worker;

import "common/header.proto";
import "common/errors.proto";

// ============================================================================
// Data-Plane Request/Response Headers
// ============================================================================

// DataRequestHeaderProto is carried by low-frequency worker data-plane control
// operations such as OpenRead, OpenWrite, CommitWrite, AbortWrite, and
// SyncCommittedBlock.
//
// Hot-path stream frames intentionally do not carry this header. Stream
// identity, sequence, offset, and flow-control fields are carried by the stream
// frame messages themselves.
message DataRequestHeaderProto {
  /// Client information (call_id, client_id, client_name).
  common.ClientInfoProto client = 1;

  /// W3C Trace Context: traceparent header value.
  string traceparent = 2;
}

/// Response header for data-plane operations.
/// Recoverable business or protocol errors use common.ErrorDetailProto and may
/// be returned with gRPC OK.
/// Transport or framework errors may still use non-OK gRPC status.
message DataResponseHeaderProto {
  /// Client information (call_id, client_id, client_name).
  common.ClientInfoProto client = 1;

  /// Canonical error detail (single source of truth for all error semantics).
  /// If error_class = ERROR_CLASS_OK, this field should be unset or have error_class = OK.
  /// For errors, this field contains all error information (class, code, reason, retry_after_ms).
  optional common.ErrorDetailProto error = 2;
}
