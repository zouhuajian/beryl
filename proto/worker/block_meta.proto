syntax = "proto3";

package worker;

import "common/common.proto";

message BlockMetaPayloadProto {
  BlockIdentityProto identity = 1;
  BlockFormatProto format = 2;
  BlockSourceProto source = 3;
  BlockVisibilityProto visibility = 4;
}

message BlockIdentityProto {
  common.BlockIdProto block_id = 1;
  common.ShardGroupIdProto group_id = 2;
}

message BlockFormatProto {
  uint32 format_id = 1;
  // Full logical block size from the persisted FileLayout. Tail or bounded
  // valid length is stored in BlockSource.effective_block_len.
  uint64 block_size = 2;
  uint32 chunk_size = 3;
  // Checksum algorithm for .blk StorageChunk data; it does not protect this metadata file.
  ChecksumKindProto checksum_kind = 4;
}

message BlockSourceProto {
  uint64 effective_block_len = 1;
}

message BlockVisibilityProto {
  BlockStateProto block_state = 1;
  uint64 block_stamp = 2;
}

enum BlockStateProto {
  BLOCK_STATE_UNSPECIFIED = 0;
  BLOCK_STATE_READY = 1;
  BLOCK_STATE_CORRUPT = 2;
}

enum ChecksumKindProto {
  CHECKSUM_KIND_UNSPECIFIED = 0;
  CHECKSUM_KIND_NONE = 1;
}
