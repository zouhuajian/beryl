syntax = "proto3";

package worker;

import "common/common.proto";
import "worker/data_header.proto";

// ============================================================================
// Worker Data Service: block-local stream API
// ============================================================================
//
// Block is the management, routing, reporting, replication, migration, eviction,
// and repair task unit. StorageChunk is a worker-local storage, IO, checksum,
// and valid-bitmap granularity. Repair/backfill operates on Blocks, but may
// read, verify, transfer, and persist data in StorageChunk slices internally.
// TransportFrame is represented by the stream request/response payloads below.
// StorageChunk and TransportFrame are intentionally not encoded as the same
// message.

message OpenReadStreamRequestProto {
  worker.DataRequestHeaderProto header = 1;
  common.BlockIdProto block_id = 2;
  common.ByteRangeProto range_in_block = 3;
  uint64 expected_block_stamp = 4;
  uint32 preferred_frame_size = 5;
}

message OpenReadStreamResponseProto {
  worker.DataResponseHeaderProto header = 1;
  common.StreamIdProto stream_id = 2;
  uint32 accepted_frame_size = 3;
  uint32 flow_control_window_bytes = 4;
  uint64 current_block_stamp = 5;
  uint64 committed_length = 6;
  uint32 storage_chunk_size = 7;
}

message ReadStreamRequestProto {
  common.StreamIdProto stream_id = 1;
  uint32 max_bytes = 2;
}

message ReadStreamResponseProto {
  uint64 offset_in_block = 1;
  bytes data = 2;
  uint32 checksum32 = 3;
  bool eos = 4;
}

message OpenWriteStreamRequestProto {
  worker.DataRequestHeaderProto header = 1;
  common.BlockIdProto block_id = 2;
  common.FencingTokenProto token = 3;
  uint64 expected_block_stamp = 4;
  uint32 preferred_frame_size = 5;
}

message OpenWriteStreamResponseProto {
  worker.DataResponseHeaderProto header = 1;
  common.StreamIdProto stream_id = 2;
  uint32 accepted_frame_size = 3;
  uint32 flow_control_window_bytes = 4;
  uint64 current_block_stamp = 5;
  uint64 committed_length = 6;
  uint32 storage_chunk_size = 7;
}

message WriteStreamRequestProto {
  common.StreamIdProto stream_id = 1;
  uint64 seq = 2;
  uint64 offset_in_block = 3;
  bytes data = 4;
  uint32 checksum32 = 5;
}

message WriteStreamResponseProto {
  bool accepted = 1;
  uint64 last_acked_seq = 2;
  uint64 persisted_through = 3;
}

message CommitWriteRequestProto {
  worker.DataRequestHeaderProto header = 1;
  common.StreamIdProto stream_id = 2;
  common.BlockIdProto block_id = 3;
  common.FencingTokenProto token = 4;
  uint64 commit_seq = 5;
  uint64 committed_length = 6;
  bool require_sync = 7;
}

message CommitWriteResponseProto {
  worker.DataResponseHeaderProto header = 1;
  uint64 committed_length = 2;
  uint64 current_block_stamp = 3;
  uint64 persisted_through = 4;
}

message AbortWriteRequestProto {
  worker.DataRequestHeaderProto header = 1;
  common.StreamIdProto stream_id = 2;
  common.BlockIdProto block_id = 3;
  common.FencingTokenProto token = 4;
  string reason = 5;
}

message AbortWriteResponseProto {
  worker.DataResponseHeaderProto header = 1;
  bool aborted = 2;
}

service WorkerDataService {
  rpc OpenReadStream(OpenReadStreamRequestProto)
      returns (OpenReadStreamResponseProto);

  rpc ReadStream(ReadStreamRequestProto)
      returns (stream ReadStreamResponseProto);

  rpc OpenWriteStream(OpenWriteStreamRequestProto)
      returns (OpenWriteStreamResponseProto);

  rpc WriteStream(stream WriteStreamRequestProto)
      returns (WriteStreamResponseProto);

  rpc CommitWrite(CommitWriteRequestProto)
      returns (CommitWriteResponseProto);

  rpc AbortWrite(AbortWriteRequestProto)
      returns (AbortWriteResponseProto);
}
