# Vecton core-site baseline.
# This file intentionally contains only keys consumed by the current metadata
# and worker runtimes.

# Metadata RPC service.
metadata.rpc.addr: "0.0.0.0"
metadata.rpc.port: 18080

# Metadata persistent state root. RocksDB state, Raft log/state, and snapshot
# metadata live under this directory.
metadata.storage.dir: "data/metadata"

# Filesystem authz provider. The current runtime supports NONE.
metadata.authz.filesystem.mode: "NONE"

# Single-group metadata authority baseline.
metadata.authority.group_id: 1

# Raft identity and initial peer list for the configured authority group.
metadata.raft.node_id: 1
metadata.raft.peers: ""

# Root mount readiness backoff.
metadata.bootstrap.root_ready_initial_backoff_ms: 200
metadata.bootstrap.root_ready_max_backoff_ms: 5000
metadata.bootstrap.root_ready_warn_after_ms: 60000

# Metadata repair queue policy.
metadata.repair.max_queue_size: 10000
metadata.repair.max_attempts: 3
metadata.repair.inflight_timeout_ms: 300000
metadata.repair.initial_backoff_ms: 1000
metadata.repair.max_backoff_ms: 60000
metadata.repair.worker_inflight_limit: 4

# Worker data service.
worker.identity.path: "./data/worker.identity"
worker.rpc.bind: "0.0.0.0:9090"
worker.rpc.advertised_endpoint: "http://127.0.0.1:9090"
worker.rpc.max_inflight: 100
worker.default_frame_size: "1MB"
worker.max_frame_size: "4MB"
worker.window_bytes: "8MB"
worker.chunk_size: "1MB"
worker.stream.idle_timeout_ms: 60000
worker.storage.root: "./data"

# Worker metadata startup registration.
worker.metadata.group_id: 1
worker.metadata.endpoint: "http://127.0.0.1:18080"
worker.metadata.endpoints: "http://127.0.0.1:18080"
worker.metadata.register_timeout_ms: 5000
worker.metadata.register_retry_initial_backoff_ms: 200
worker.metadata.register_retry_max_backoff_ms: 5000
