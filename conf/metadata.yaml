# Vecton metadata baseline. Run with:
# metadata format --config conf/metadata.yaml
# metadata start --config conf/metadata.yaml

vecton.cluster.id: "local-vecton"

# Metadata RPC service.
metadata.rpc.addr: "0.0.0.0"
metadata.rpc.port: 18080

# Metadata persistent state root. RocksDB state, Raft log/state, and snapshot
# metadata live under this directory.
metadata.storage.dir: "data/metadata"

# Filesystem authz provider. The current runtime supports NONE.
metadata.authz.filesystem.mode: "NONE"

# Single-group metadata authority baseline.
metadata.group.name: "root"

# Raft identity for the configured authority group. Cluster mode parses but is
# not a supported startup mode yet.
metadata.raft.node_id: 1
metadata.raft.mode: "single"

# Root mount readiness backoff.
metadata.bootstrap.root_ready_initial_backoff_ms: 200
metadata.bootstrap.root_ready_max_backoff_ms: 5000
metadata.bootstrap.root_ready_warn_after_ms: 60000

# Metadata repair queue policy.
metadata.repair.max_queue_size: 10000
metadata.repair.max_attempts: 3
metadata.repair.inflight_timeout_ms: 300000
metadata.repair.initial_backoff_ms: 1000
metadata.repair.max_backoff_ms: 60000
metadata.repair.worker_inflight_limit: 4

observe.log.format: compact
observe.log.output: stderr
observe.log.level: "info,vecton=info,metadata=info,worker=info,common=info,openraft=warn,tonic=warn,tower=warn,h2=warn"
observe.metrics.prometheus.bind: "127.0.0.1:18081"
observe.metrics.prometheus.path: "/metrics"
