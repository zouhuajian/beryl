# Vecton client-site baseline.
# This file intentionally contains only keys consumed by the current client
# runtime.

# Client display identity and metadata bootstrap targets.
client.name: "default_client"
client.metadata.endpoints: "127.0.0.1:18080"
client.metadata.group.names: "root"

# Logical operation retry, refresh, timeout, and backoff.
client.retry.max_retry_attempts: 3
client.retry.metadata_budget: 3
client.retry.worker_budget: 3
client.retry.session_barrier_budget: 0
client.refresh.max_attempts: 3
client.operation.timeout_ms: null
client.backoff.initial_ms: 100
client.backoff.max_ms: 5000
client.backoff.multiplier: "2.0"

# Metadata-authoritative worker endpoint cache.
client.cache.worker_endpoint.enabled: false
client.cache.worker_endpoint.ttl_secs: 0
client.cache.worker_endpoint.max_entries: 1024
client.cache.worker_endpoint.health.enabled: true
client.cache.worker_endpoint.health.failure_threshold: 2
client.cache.worker_endpoint.health.ttl_secs: 5

# Metadata and worker gRPC channel pools.
client.channel_pool.metadata.enabled: true
client.channel_pool.metadata.max_per_group: 1
client.channel_pool.worker.enabled: true
client.channel_pool.worker.max_per_worker: 1
