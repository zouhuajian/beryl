# Beryl client-site baseline.
# This file intentionally contains only keys consumed by the current client
# runtime.

# Client display identity and metadata bootstrap targets.
client.name: "default_client"
client.metadata.group.names: "root"
client.metadata.group.root.endpoints: "127.0.0.1:18080"

# Total primary RPC attempts and finite public-operation timeout.
client.retry.max_attempts: 3
client.operation.timeout_ms: 30000

# Write lease renewal.
client.write_lease.auto_renew: true
client.write_lease.renew_before_expiry_ms: 30000

# Metadata and worker gRPC channel pools.
client.channel_pool.metadata.enabled: true
client.channel_pool.metadata.max_per_group: 1
client.channel_pool.worker.enabled: true
client.channel_pool.worker.max_per_worker: 1
client.channel_pool.worker.endpoint_cooldown_ms: 1000
